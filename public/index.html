<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홀덤 그래픽스</title>
    <style>
        body { background: #073a11; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        #game { padding: 10px; }
        .card-img { width: 60px; height: 85px; margin: 3px; border-radius: 4px; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); vertical-align: middle; }
        .pot-area { font-size: 26px; color: #ffcc00; margin: 15px 0; font-weight: bold; }
        .player-slot { background: rgba(0,0,0,0.4); margin: 5px auto; width: 90%; max-width: 400px; padding: 10px; border-radius: 10px; border: 1px solid #ffffff33; }
        .active-turn { border: 2px solid yellow; background: rgba(255,255,0,0.1); }
        .btn-group button { width: 22%; padding: 10px 0; margin: 1%; font-weight: bold; border-radius: 5px; border: none; cursor: pointer; }
        .disabled { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
        .main-controls { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .main-controls button { padding: 15px 30px; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; }
        #chatBox { height: 100px; overflow-y: auto; background: rgba(0,0,0,0.5); text-align: left; padding: 10px; font-size: 13px; border-top: 1px solid #444; }
    </style>
</head>
<body>
    <div id="lobby" style="padding-top: 100px;">
        <h1>♠️ HOLDEM CLUB ♣️</h1>
        <input type="text" id="nick" placeholder="닉네임" style="padding:10px;">
        <input type="text" id="room" placeholder="방코드" style="padding:10px;">
        <button onclick="join()" style="padding:10px 20px; background: red; color: white; border: none;">참가</button>
    </div>

    <div id="game" style="display:none;">
        <div class="pot-area">💰 POT: <span id="potAmount">0</span></div>
        <div id="communityCards"></div>
        <div id="handRank" style="color: #00ffcc; font-weight: bold; margin: 10px 0;"></div>
        <div id="myCards"></div>

        <div class="btn-group">
            <button id="checkBtn" class="check" onclick="sendAction('check')" style="background:#888;">체크</button>
            <button id="callBtn" class="call" onclick="sendAction('call')" style="background:#007bff; color:white;">콜 <span id="callVal"></span></button>
            <button id="raiseBtn" class="raise" onclick="sendAction('raise', 1000)" style="background:#28a745; color:white;">+1000</button>
            <button id="foldBtn" class="fold" onclick="sendAction('fold')" style="background:#dc3545; color:white;">폴드</button>
        </div>

        <div class="main-controls">
            <button id="startBtn" onclick="socket.emit('startGame', currentRoom)" style="background: #ffcc00; color: black;">새 게임 시작</button>
            <button id="leaveBtn" onclick="leave()" style="background: #444; color: white;">게임 나가기</button>
        </div>

        <div id="players"></div>
        <div id="chatBox"></div>
        <div style="display:flex;">
            <input type="text" id="chatInput" style="flex:1; padding:10px; border:none;" placeholder="채팅 입력...">
            <button onclick="sendChat()" style="padding:10px; background:#555; color:white;">전송</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pokersolver@2.1.2/pokersolver.min.js"></script>
    <script>
        const socket = io();
        let currentRoom = '', myCards = [], communityCards = [];

        // 카드 텍스트를 이미지 파일 이름으로 변환 (예: As -> ACE of SPADES)
        function getCardImg(cardStr) {
            const val = cardStr.slice(0, -1);
            const suit = cardStr.slice(-1);
            const valMap = { 'T':'10', 'J':'JACK', 'Q':'QUEEN', 'K':'KING', 'A':'ACE' };
            const suitMap = { 's':'SPADES', 'h':'HEARTS', 'd':'DIAMONDS', 'c':'CLUBS' };
            const v = valMap[val] || val;
            const s = suitMap[suit];
            // 무료 온라인 카드 이미지 라이브러리 사용
            return `https://www.deckofcardsapi.com/static/img/${val === 'T' ? '0' : val}${suit.toUpperCase()}.png`;
        }

        function join() {
            const nickname = document.getElementById('nick').value;
            currentRoom = document.getElementById('room').value;
            if(!nickname || !currentRoom) return;
            socket.emit('joinRoom', { roomCode: currentRoom, nickname });
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game').style.display = 'block';
        }

        function leave() { socket.emit('leaveRoom'); location.reload(); }
        function sendAction(type, amount = 0) { socket.emit('action', { roomCode: currentRoom, type, amount }); }
        function sendChat() {
            const input = document.getElementById('chatInput');
            if(input.value) { socket.emit('sendMessage', { roomCode: currentRoom, msg: input.value }); input.value = ''; }
        }

        socket.on('roomUpdate', (room) => {
            document.getElementById('potAmount').innerText = room.pot;
            const pDiv = document.getElementById('players');
            pDiv.innerHTML = '';

            const me = room.players.find(p => p.id === socket.id);
            const isMyTurn = room.players[room.currentTurn]?.id === socket.id && room.gameState === 'playing';
            
            // 1. 혼자일 때 시작 버튼 비활성화
            const activeCount = room.players.filter(p => !p.isWaiting).length;
            document.getElementById('startBtn').disabled = (room.gameState === 'playing' || activeCount < 2);
            document.getElementById('startBtn').style.opacity = (room.gameState === 'playing' || activeCount < 2) ? 0.4 : 1;

            if(me && isMyTurn) {
                const diff = room.currentMaxBet - me.roundBet;
                document.getElementById('callVal').innerText = diff > 0 ? `(${diff})` : '';
                document.getElementById('checkBtn').classList.toggle('disabled', diff > 0);
                document.getElementById('callBtn').classList.toggle('disabled', diff === 0);
            }

            room.players.forEach((p, idx) => {
                const turn = room.currentTurn === idx && room.gameState === 'playing' ? 'active-turn' : '';
                pDiv.innerHTML += `
                    <div class="player-slot ${turn}">
                        <b>${p.nickname}</b> | 💰${p.chips}<br>
                        <small>${p.lastAction || '대기'} ${p.folded ? '❌FOLD' : ''} ${p.isWaiting ? '(다음판 참여)' : ''}</small>
                    </div>`;
            });
            if(me) solveHand(me);
        });

        function solveHand(me) {
            if(me.cards.length < 2) return;
            const combined = [...me.cards, ...communityCards];
            if(combined.length >= 2) {
                const hand = Hand.solve(combined);
                document.getElementById('handRank').innerText = "내 족보: " + hand.descr;
            }
        }

        socket.on('dealPrivateCards', (cards) => {
            myCards = cards;
            const div = document.getElementById('myCards');
            div.innerHTML = '<h4>MY CARDS</h4>';
            cards.forEach(c => div.innerHTML += `<img src="${getCardImg(c)}" class="card-img">`);
        });

        socket.on('communityUpdate', (cards) => {
            communityCards = cards;
            const div = document.getElementById('communityCards');
            div.innerHTML = '<h4>COMMUNITY</h4>';
            cards.forEach(c => div.innerHTML += `<img src="${getCardImg(c)}" class="card-img">`);
        });

        socket.on('chatUpdate', (msg) => {
            const b = document.getElementById('chatBox');
            b.innerHTML += `<div>${msg}</div>`;
            b.scrollTop = b.scrollHeight;
        });

        socket.on('alert', (msg) => alert(msg));
    </script>
</body>
</html>
