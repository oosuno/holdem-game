<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>텍사스 홀덤 테이블</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background-color: #1a4314; color: white; font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* [수정] 라운드 표시 UI */
        #round-indicator { position: absolute; top: 20px; font-size: 22px; font-weight: bold; color: #ffeb3b; background: rgba(0,0,0,0.5); padding: 5px 20px; border-radius: 20px; }

        #table { position: relative; width: 900px; height: 450px; background-color: #2e7d32; border: 15px solid #5d4037; border-radius: 220px; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 50px rgba(0,0,0,0.5); }
        
        /* [수정] Pot UI: 칩 이미지 제거 및 텍스트 추가 */
        #pot-display { position: absolute; top: 80px; font-size: 24px; font-weight: bold; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 10px; }

        #community-cards { display: flex; gap: 10px; }
        .card { width: 60px; height: 85px; background: white; color: black; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; border: 1px solid #ccc; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); }
        .card.red { color: #e91e63; }
        .card.back { background: #3f51b5; color: #3f51b5; border: 2px solid white; }

        .player { position: absolute; width: 120px; text-align: center; }
        .player-info { background: rgba(0,0,0,0.7); padding: 8px; border-radius: 10px; border: 2px solid transparent; }
        .player.active .player-info { border-color: #ffeb3b; box-shadow: 0 0 15px #ffeb3b; }
        .player-cards { display: flex; gap: 5px; justify-content: center; margin-top: 5px; }
        .rank-text { font-size: 12px; color: #ffeb3b; margin-top: 4px; height: 14px; }

        /* [수정] 쇼다운 배너 */
        #showdown-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); border-radius: 200px; z-index: 100; align-items: center; justify-content: center; }
        #showdown-text { font-size: 60px; font-weight: bold; color: white; text-shadow: 0 0 20px red; letter-spacing: 10px; animation: blink 0.5s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.5; } }

        #ui-controls { margin-top: 30px; display: flex; gap: 10px; }
        input, button { padding: 10px; font-size: 16px; border-radius: 5px; border: none; }
        button { cursor: pointer; background: #4caf50; color: white; font-weight: bold; }
        button:hover { background: #45a049; }
        .btn-fold { background: #f44336; }
        .btn-muck { background: #757575; }
    </style>
</head>
<body>

    <div id="round-indicator">대기 중...</div>

    <div id="table">
        <div id="showdown-overlay"><div id="showdown-text">SHOWDOWN</div></div>
        
        <div id="pot-display">Pot: <span id="pot-amount">0</span></div>
        
        <div id="community-cards"></div>

        <div id="players-container"></div>
    </div>

    <div id="ui-controls">
        <div id="join-ui">
            <input type="text" id="nick-input" placeholder="닉네임">
            <button onclick="join()">게임 입장</button>
        </div>
        <div id="game-ui" style="display:none;">
            <button id="ready-btn" onclick="toggleReady()">준비하기</button>
            <div id="action-btns" style="display:none;">
                <button onclick="doAction('check')">체크/콜</button>
                <input type="number" id="raise-amount" style="width:80px;" placeholder="금액">
                <button onclick="doAction('raise')">레이즈</button>
                <button class="btn-fold" onclick="doAction('fold')">폴드</button>
            </div>
            <div id="showdown-btns" style="display:none;">
                <button onclick="doShowdown('show')">패 오픈</button>
                <button id="muck-btn" class="btn-muck" onclick="doShowdown('muck')">MUCK</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let myId = null;
        let currentRoom = 'default-room';
        let isShowdownTriggered = false;

        function join() {
            const nickname = document.getElementById('nick-input').value;
            if(!nickname) return;
            socket.emit('joinRoom', { roomCode: currentRoom, nickname });
            document.getElementById('join-ui').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            myId = socket.id;
        }

        function toggleReady() {
            socket.emit('toggleReady', currentRoom);
        }

        function doAction(type) {
            const amount = parseInt(document.getElementById('raise-amount').value) || 0;
            socket.emit('action', { roomCode: currentRoom, type, amount });
        }

        function doShowdown(action) {
            socket.emit('showdownAction', { roomCode: currentRoom, action });
            document.getElementById('showdown-btns').style.display = 'none';
        }

        socket.on('roomUpdate', (room) => {
            updateUI(room);
        });

        socket.on('dealPrivateCards', (cards) => {
            console.log("나의 카드:", cards);
        });

        socket.on('communityUpdate', (cards) => {
            const container = document.getElementById('community-cards');
            container.innerHTML = cards.map(c => renderCard(c)).join('');
        });

        socket.on('alert', (msg) => { alert(msg); isShowdownTriggered = false; });

        function renderCard(cardStr) {
            if(!cardStr) return `<div class="card back"></div>`;
            const val = cardStr[0].replace('T','10');
            const suitMap = { 's':'♠', 'h':'♥', 'd':'♦', 'c':'♣' };
            const isRed = (cardStr[1] === 'h' || cardStr[1] === 'd');
            return `<div class="card ${isRed?'red':''}"><div>${val}</div><div>${suitMap[cardStr[1]]}</div></div>`;
        }

        function updateUI(room) {
            // [수정] 라운드 표시 로직
            const roundIndicator = document.getElementById('round-indicator');
            if (room.gameState === 'playing' || room.gameState === 'showdown') {
                const count = room.communityCards.length;
                if(count === 0) roundIndicator.innerText = "프리플랍 (Pre-flop)";
                else if(count === 3) roundIndicator.innerText = "플랍 (Flop)";
                else if(count === 4) roundIndicator.innerText = "턴 (Turn)";
                else if(count === 5) roundIndicator.innerText = "리버 (River)";
            } else {
                roundIndicator.innerText = "대기 중...";
            }

            // [수정] Pot 표시
            document.getElementById('pot-amount').innerText = room.pot.toLocaleString();

            // [수정] 쇼다운 배너 및 MUCK 로직
            if (room.gameState === 'showdown' && !isShowdownTriggered) {
                isShowdownTriggered = true;
                const overlay = document.getElementById('showdown-overlay');
                overlay.style.display = 'flex';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    handleShowdownUI(room);
                }, 2000); // 2초간 "SHOWDOWN" 표시 후 진행
            }

            const me = room.players.find(p => p.id === socket.id);
            const isMyTurn = room.gameState === 'playing' && room.players[room.currentTurn]?.id === socket.id;
            document.getElementById('action-btns').style.display = isMyTurn ? 'block' : 'none';
            document.getElementById('ready-btn').style.display = room.gameState === 'waiting' ? 'block' : 'none';

            // 플레이어 렌더링
            const container = document.getElementById('players-container');
            container.innerHTML = '';
            room.players.forEach((p, i) => {
                const isMe = p.id === socket.id;
                // 공격자이거나 승자, 혹은 오픈을 누른 경우만 카드 공개
                const show
