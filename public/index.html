<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홀덤 프로</title>
    <style>
        body { background: #121212; color: #eee; font-family: 'Apple SD Gothic Neo', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #game { flex: 1; overflow-y: auto; padding: 10px; }
        .card { display: inline-block; background: white; color: black; padding: 8px; margin: 2px; border-radius: 4px; font-weight: bold; width: 35px; text-align: center; font-size: 14px; }
        .red { color: #d32f2f; }
        .player-slot { padding: 12px; margin: 8px auto; width: 90%; background: #2a2a2a; border-radius: 8px; position: relative; transition: 0.3s; }
        .active-turn { border: 2px solid #ffd700; box-shadow: 0 0 15px rgba(255,215,0,0.3); }
        .disabled { position: relative; opacity: 0.6; pointer-events: none; }
        .disabled::after { content: '❌'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; z-index: 10; }
        .chat-container { height: 150px; background: #000; border-top: 1px solid #444; display: flex; flex-direction: column; }
        #chatBox { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; text-align: left; }
        .hand-rank { color: #00ffcc; font-weight: bold; margin: 10px 0; font-size: 18px; }
        button { padding: 10px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .btn-group button { width: 23%; font-size: 12px; }
    </style>
</head>
<body>
    <div id="lobby">
        <h2 style="margin-top:100px;">♠️ HOLDEM ONLINE ♣️</h2>
        <input type="text" id="nick" placeholder="닉네임">
        <input type="text" id="room" placeholder="방코드">
        <button onclick="join()" style="background:#e50914; color:white; width:100px;">입장</button>
    </div>

    <div id="game" style="display:none;">
        <button onclick="leave()" style="background:#444; color:white; float:right;">나가기</button>
        <div style="font-size: 24px; color: gold; margin-bottom: 10px;">💰 POT: <span id="potAmount">0</span></div>
        <div id="community"></div>
        <div id="handRankDisplay" class="hand-rank"></div>
        <div id="myCards"></div>
        
        <div class="btn-group" id="actionButtons" style="margin: 15px 0;">
            <button id="checkBtn" class="check" onclick="sendAction('check')">체크</button>
            <button id="callBtn" class="call" onclick="sendAction('call')">콜 <small id="callVal"></small></button>
            <button id="raiseBtn" class="raise" onclick="sendAction('raise', 1000)">+1000</button>
            <button id="foldBtn" class="fold" onclick="sendAction('fold')">폴드</button>
        </div>

        <button id="startBtn" onclick="socket.emit('startGame', currentRoom)" style="width:80%; background:#28a745; color:white;">새 게임 시작</button>
        <div id="players"></div>
    </div>

    <div class="chat-container" id="chatArea" style="display:none;">
        <div id="chatBox"></div>
        <div style="display:flex;">
            <input type="text" id="chatInput" style="flex:1; padding:10px; border:none; background:#222; color:white;" placeholder="메시지 입력...">
            <button onclick="sendChat()" style="background:#e50914; color:white; border-radius:0;">전송</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pokersolver@2.1.2/pokersolver.min.js"></script>
    <script>
        const socket = io();
        let currentRoom = '', myId = '', myCards = [], communityCards = [];

        function join() {
            const nickname = document.getElementById('nick').value;
            currentRoom = document.getElementById('room').value;
            if(!nickname || !currentRoom) return;
            socket.emit('joinRoom', { roomCode: currentRoom, nickname });
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            document.getElementById('chatArea').style.display = 'flex';
            myId = socket.id;
        }

        function leave() {
            socket.emit('leaveRoom');
            location.reload();
        }

        function sendAction(type, amount = 0) {
            socket.emit('action', { roomCode: currentRoom, type, amount });
        }

        function sendChat() {
            const input = document.getElementById('chatInput');
            if(input.value) {
                socket.emit('sendMessage', { roomCode: currentRoom, msg: input.value });
                input.value = '';
            }
        }

        socket.on('chatUpdate', (msg) => {
            const box = document.getElementById('chatBox');
            box.innerHTML += `<div>${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        });

        socket.on('roomUpdate', (room) => {
            document.getElementById('potAmount').innerText = room.pot;
            const pDiv = document.getElementById('players');
            pDiv.innerHTML = '';
            
            const me = room.players.find(p => p.id === socket.id);
            const isMyTurn = room.players[room.currentTurn]?.id === socket.id;
            
            // 버튼 상태 업데이트
            document.getElementById('startBtn').disabled = (room.gameState === 'playing');
            document.getElementById('startBtn').style.opacity = (room.gameState === 'playing') ? 0.3 : 1;
            
            if(me && isMyTurn) {
                const callAmount = room.currentMaxBet - me.roundBet;
                document.getElementById('callVal').innerText = callAmount > 0 ? callAmount : '';
                
                // 체크/콜 X표시 로직
                document.getElementById('checkBtn').className = (callAmount > 0) ? 'disabled' : 'check';
                document.getElementById('callBtn').className = (callAmount === 0) ? 'disabled' : 'call';
            }

            room.players.forEach((p, idx) => {
                const isTurn = (room.currentTurn === idx && room.gameState === 'playing');
                pDiv.innerHTML += `
                    <div class="player-slot ${isTurn ? 'active-turn' : ''}">
                        <strong>${p.nickname}</strong> ${p.id === socket.id ? '(나)' : ''}<br>
                        💰${p.chips} | 액션: ${p.lastAction || '-'}
                        ${p.folded ? '<span style="color:red;"> [FOLD]</span>' : ''}
                        ${p.isWaiting ? '<small>(대기중)</small>' : ''}
                    </div>`;
            });
            updateHandRank(me);
        });

        function updateHandRank(me) {
            if(!me || me.cards.length === 0) return;
            const combined = [...me.cards, ...communityCards];
            if(combined.length >= 2) {
                try {
                    const hand = Hand.solve(combined);
                    document.getElementById('handRankDisplay').innerText = "현재 족보: " + hand.descr;
                } catch(e) {}
            }
        }

        socket.on('dealPrivateCards', (cards) => {
            myCards = cards;
            const div = document.getElementById('myCards');
            div.innerHTML = '<h4>내 카드</h4>';
            cards.forEach(c => {
                const suit = c.slice(-1), val = c.slice(0, -1);
                const isRed = (suit === 'h' || suit === 'd') ? 'red' : '';
                const suitIcon = {s:'♠', h:'♥', d:'♦', c:'♣'}[suit];
                div.innerHTML += `<div class="card ${isRed}">${val}${suitIcon}</div>`;
            });
        });

        socket.on('communityUpdate', (cards) => {
            communityCards = cards;
            const div = document.getElementById('community');
            div.innerHTML = '<h4>커뮤니티</h4>';
            cards.forEach(c => {
                const suit = c.slice(-1), val = c.slice(0, -1);
                const isRed = (suit === 'h' || suit === 'd') ? 'red' : '';
                const suitIcon = {s:'♠', h:'♥', d:'♦', c:'♣'}[suit];
                div.innerHTML += `<div class="card ${isRed}">${val}${suitIcon}</div>`;
            });
        });

        socket.on('alert', (msg) => alert(msg));
    </script>
</body>
</html>
